<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link href="main.css" rel="stylesheet">
        <title>Place Order</title>
    </head>
    <body>
        <h2>Place an Order</h2>
        <p id="userStatus">Checking login status...</p>
        <div class="form_container">
            <form id="orderForm">
                <label for="item">Item:</label><br>
                <input type="text" id="item" name="item" required><br>
                <label for="quantity">Quantity:</label><br>
                <input type="number" id="quantity" name="quantity" min="1" required><br>
                <label for="totalPrice">Total Price:</label><br>
                <input type="number" id="totalPrice" name="totalPrice" step="0.01" min="0" required><br><br>
                <button type="submit" class="black_button">Place Order</button>
            </form>
            <br>
            <button id="viewOrdersBtn" class="black_button" onclick="window.location.href='ViewOrders.html'">View My Orders</button>
            <button id="logoutBtn" class="black_button">Logout</button>
        </div>
        <script type="module" src="OrderSend.js"></script>
    </body>
</html>
